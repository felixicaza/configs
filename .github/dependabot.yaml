version: 2

updates:
   - package-ecosystem: "npm"
     directory: "/"
     open-pull-requests-limit: 15
     target-branch: "main"
     assignees:
        - "felixicaza"
     labels:
        - "dependencies"
     commit-message:
        prefix: "chore(deps)"
     schedule:
        interval: "cron"
        cronjob: "0 0 1,16 * *"
        timezone: "America/Costa_Rica"
     ignore:
        - dependency-name: "eslint"
          update-types: ["version-update:semver-major"]
     groups:
        dependencies:
           patterns:
              - "*"
           update-types:
              - "minor"
              - "patch"

   # github-actions
   - package-ecosystem: "github-actions"
     directory: "/"
     open-pull-requests-limit: 15
     target-branch: "main"
     assignees:
        - "felixicaza"
     labels:
        - "actions"
     commit-message:
        prefix: "chore(actions)"
     schedule:
        interval: "monthly"
        day: "friday"
        time: "00:00"
        timezone: "America/Costa_Rica"
     groups:
        dependencies:
           patterns:
              - "*"
           update-types:
              - "major"
